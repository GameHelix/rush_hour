<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080814"/>
      <stop offset="100%" style="stop-color:#12122a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>

  <!-- Grid lines (3×3 visible cells) -->
  <g opacity="0.15" stroke="#ffffff" stroke-width="0.5">
    <line x1="24" y1="8" x2="24" y2="56"/>
    <line x1="40" y1="8" x2="40" y2="56"/>
    <line x1="8"  y1="24" x2="56" y2="24"/>
    <line x1="8"  y1="40" x2="56" y2="40"/>
  </g>

  <!-- Red car (target) — spans two cells in the middle row -->
  <g filter="url(#glow2)">
    <rect x="9" y="27" width="30" height="10" rx="4"
          fill="#ff336699" stroke="#ff3366" stroke-width="1.5"/>
    <!-- Windshield highlight -->
    <rect x="13" y="29" width="8" height="6" rx="2" fill="#ff336633" stroke="#ff336688" stroke-width="0.8"/>
    <!-- Wheels -->
    <circle cx="14" cy="38" r="2.5" fill="#ff3366" opacity="0.7"/>
    <circle cx="32" cy="38" r="2.5" fill="#ff3366" opacity="0.7"/>
  </g>

  <!-- Vertical blocker — right column -->
  <g filter="url(#glow)">
    <rect x="43" y="9" width="10" height="30" rx="4"
          fill="#a855f799" stroke="#a855f7" stroke-width="1.2"/>
  </g>

  <!-- Exit arrow -->
  <g filter="url(#glow)" fill="#ff3366" opacity="0.9">
    <polygon points="54,32 60,37 60,27"/>
  </g>
</svg>
